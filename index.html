<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ee4d2e" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)" />
  <title>Español SRS</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Español" />
  <link rel="preload" href="fonts/bricolage.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <span class="brand">Español<span class="brand-dot">·</span>SRS</span>
      <span id="topbar-meta" class="topbar-meta"></span>
    </div>
  </header>

  <main id="app" class="app"><!-- views render here --></main>

  <nav class="tabbar" id="tabbar">
    <button class="tab" data-view="review" aria-label="Lernen">
      <span class="tab-ico">◆</span><span class="tab-label">Lernen</span>
    </button>
    <button class="tab" data-view="cards" aria-label="Karten">
      <span class="tab-ico">▤</span><span class="tab-label">Karten</span>
    </button>
    <button class="tab tab-add" data-view="edit" aria-label="Neue Karte">
      <span class="tab-ico">+</span><span class="tab-label">Neu</span>
    </button>
    <button class="tab" data-view="stats" aria-label="Statistik">
      <span class="tab-ico">▦</span><span class="tab-label">Stats</span>
    </button>
    <button class="tab" data-view="more" aria-label="Mehr">
      <span class="tab-ico">⋯</span><span class="tab-label">Mehr</span>
    </button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
